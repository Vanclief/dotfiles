# #
# # repo  : https://github.com/vanclief/dotfiles/
# # file  : tmux.conf

# improve colors — true color (24-bit) so hex theme colors render accurately
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB,xterm-256color:RGB"

# let nvim see focus changes (autoread, cursor shape, FocusGained/Lost)
set -g focus-events on

# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# vi-style copy: v to select, y to yank into the macOS clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

set -g prefix2 C-s

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set-window-option -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# increase scrollback lines
set -g history-limit 10000

# prefix -> back-one-character
bind-key C-b send-prefix
# prefix-2 -> forward-incremental-history-search
bind-key C-s send-prefix -2

# don't suspend-client
unbind-key C-z

# Set default shell to Zsh
set-option -g default-shell /bin/zsh

# Use PREFIX+"\" to split horizontally and PREFIX+"-" to split vertically
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window ("tab") in the current pane's directory
unbind-key c
bind c new-window -c "#{pane_current_path}"

# Move current window to a prompted index, shifting occupied windows
bind . command-prompt -N -p "Move window to:" "if -F '#{==:%1,#{window_index}}' '' 'if -F \"#{>:%1,#{last_window_index}}\" \"move-window -t :%1\" \"if -F \\\"#{>:%1,#{window_index}}\\\" \\\"move-window -a -t :%1\\\" \\\"move-window -b -t :%1\\\"\"'"

# reload ~/.tmux.conf using PREFIX r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# write on multiple panes at once
bind y setw synchronize-panes

# Set escape-time to 10ms
set-option -sg escape-time 10

# Keep status messages on screen longer (default ~750ms)
set -g display-time 2000

# Cleaner redraw when a window is shared across differently-sized clients
setw -g aggressive-resize on

# Status bar customization — rounded "pill" style (onedark deep palette)
set -g status-interval 10         # update the status bar every 10 seconds
set -g status-justify left
set -g status-position bottom
set -g status-left-length 200     # increase length (from 10)
set -g status-right-length 200
set -g status-style 'bg=default'  # transparent background

# Palette (onedark deep)
set -g @bg      '#1e2127'   # dark text for light-colored pills
set -g @fg      '#abb2bf'   # default foreground
set -g @grey    '#5c6370'   # inactive window text
set -g @surface '#3e4452'   # clock pill background
set -g @purple  '#c678dd'   # session pill
set -g @blue    '#61afef'   # active window pill
set -g @green   '#98c379'   # cpu pill
set -g @orange  '#d19a66'   # memory pill

# Rounded caps: Nerd Font half-circle glyphs (filled via printf below)
set -g @lc ''        #  U+E0B6 left half circle
set -g @rc ''       #  U+E0B4 right half circle

# A pill = leftcap(fg=color) + content(fg=text,bg=color) + rightcap(fg=color)

# Session pill (purple)
set -g status-left "#[fg=#{@purple}]#{@lc}#[fg=#{@bg},bg=#{@purple},bold] #S #[fg=#{@purple},bg=default,nobold]#{@rc} "

# Windows: active = blue pill, inactive = plain grey text
set -g window-status-separator ""
set -g window-status-current-format "#[fg=#{@blue}]#{@lc}#[fg=#{@bg},bg=#{@blue},bold] #I:#W #[fg=#{@blue},bg=default,nobold]#{@rc} "
set -g window-status-format "#[fg=#{@grey},bg=default] #I:#W  "

# Right side: zoom flag, cpu pill (green), memory pill (orange), clock pill (grey)
set -g status-right "#[fg=#{@orange}]#{?window_zoomed_flag, Z ,}#[fg=#{@green}]#{@lc}#[fg=#{@bg},bg=#{@green},bold] #(~/dotfiles/scripts/tmux-cpu.sh) #[fg=#{@green},bg=default,nobold]#{@rc} #[fg=#{@orange}]#{@lc}#[fg=#{@bg},bg=#{@orange},bold] #(~/dotfiles/scripts/tmux-mem.sh) #[fg=#{@orange},bg=default,nobold]#{@rc} #[fg=#{@surface}]#{@lc}#[fg=#{@fg},bg=#{@surface}] %H:%M #[fg=#{@surface},bg=default]#{@rc} "

set -g window-status-last-style 'fg=white,bg=default'
set -g message-command-style bg=default,fg=grey
set -g message-style bg=default,fg=grey
set -g mode-style bg=default,fg=green

# Pane borders — dim grey when inactive, blue accent on the active pane
set -g pane-border-style "fg=#{@surface}"
set -g pane-active-border-style "fg=#{@blue}"

# Per-pane header: active pane title in bold blue, inactive in dim grey.
# Hidden on single-pane windows; shown only once a split exists (via hook below).
set -g pane-border-status off
set -g pane-border-format "#{?pane_active,#[fg=#{@blue}]#[bold] #{pane_current_command} #[default],#[fg=#{@grey}] #{pane_current_command} }"
set-hook -g window-layout-changed 'if -F "#{==:#{window_panes},1}" "setw pane-border-status off" "setw pane-border-status top"'
